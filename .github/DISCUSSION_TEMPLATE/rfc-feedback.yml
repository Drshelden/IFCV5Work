title: "[RFC Feedback] IFC5-XXX — "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Use this template to give feedback on a specific RFC. Before posting:
        - Read the RFC file in [`02 RFCs/`](https://github.com/Drshelden/IFCV5Work/tree/master/02%20RFCs)
        - Apply the correct **RFC label** (e.g. `IFC5-007`) and **tier label** using the Labels gear in the sidebar
        - Replace `IFC5-XXX` in the title with the RFC ID

  - type: dropdown
    id: rfc-id
    attributes:
      label: Which RFC does this feedback relate to?
      description: Select the RFC ID. Also apply the matching label in the sidebar.
      options:
        - "IFC5-001 — Strategic Architecture Mode"
        - "IFC5-002 — Normative Information Model Formalism"
        - "IFC5-003 — Identity Model"
        - "IFC5-004 — Path Model and Addressing"
        - "IFC5-005 — Namespace and Qualified Names"
        - "IFC5-006 — Serialization and Encoding"
        - "IFC5-007 — Scene Graph vs. ECS vs. Hybrid Architecture"
        - "IFC5-008 — Relationship Modeling Strategy"
        - "IFC5-009 — Class and Type Representation"
        - "IFC5-010 — Composition, Inheritance, and Instancing"
        - "IFC5-011 — Document-Level Structure"
        - "IFC5-012 — Modular Schema Imports"
        - "IFC5-013 — Property Sets and Properties"
        - "IFC5-014 — Geometry Architecture"
        - "IFC5-015 — OpenUSD Alignment"
        - "IFC5-016 — Spatial Structure and Decomposition"
        - "IFC5-017 — Material Modeling"
        - "IFC5-018 — Backward Compatibility and Round-Tripping"
        - "IFC5-019 — Validation Framework"
        - "IFC5-020 — Model Views and Exchange Requirements"
        - "IFC5-021 — Federation and External References"
        - "IFC5-022 — Versioning and Schema Evolution"
        - "IFC5-023 — Attribute Representation"
        - "IFC5-024 — Type System, Primitives, Enumerations, SELECTs"
        - "IFC5-025 — Collections and Cardinality"
        - "IFC5-026 — Openings, Voids, and Fillings"
        - "IFC5-027 — Classification and External Dictionaries"
        - "IFC5-028 — Units and Measures"
        - "IFC5-029 — Presentation and Appearance"
        - "IFC5-030 — Space Boundaries and Topology"
        - "IFC5-031 — Metadata and Custom Data"
        - "IFC5-032 — Extensibility"
        - "IFC5-033 — Change, Transactions, and Collaboration"
        - "IFC5-034 — Performance, Scale, and Database Implications"
        - "IFC5-035 — Web and Linked-Data Alignment"
        - "IFC5-036 — AI and Machine-Readability"
        - "IFC5-037 — Security and Trust"
        - "IFC5-038 — Governance, Conformance, and Interoperability Testing"
    validations:
      required: true

  - type: dropdown
    id: comment-type
    attributes:
      label: Comment type
      description: Classify your comment so the RFC author can triage it efficiently.
      options:
        - "Editorial — grammar or clarity, no technical impact"
        - "Technical Defect — error of fact or logic"
        - "Semantic Concern — proposal may not mean what the author intends"
        - "Compatibility Concern — conflicts with IFC4.x or existing tooling"
        - "Alternative Proposal — a different approach not in the RFC"
        - "Evidence — data, examples, or prototypes relevant to the decision"
        - "Blocking Objection — RFC cannot advance as written"
        - "General Support — I support the recommendation"
    validations:
      required: true

  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: Your comment. Be as specific as possible — reference section numbers or quote RFC text where relevant.
      placeholder: "My feedback on this RFC is..."
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Supporting evidence or examples
      description: Optional. Include links, code, schema examples, or prior art that supports your comment.
      placeholder: "Links, examples, or references..."

  - type: textarea
    id: open-questions
    attributes:
      label: Questions for the working group
      description: Optional. Number any questions you want the group to address (Q1, Q2, etc.).
      placeholder: "Q1. ..."
