name: RFC Feedback
description: Give structured feedback on a specific RFC
title: "[RFC Feedback] IFC5-XXX — "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        **Instructions:**
        1. Update the title — replace `IFC5-XXX` with the RFC ID and add a short description (e.g. `[RFC Feedback] IFC5-007 — Alternative graph model`)
        2. Fill in the fields below
        3. After posting, apply the matching RFC label (e.g. `IFC5-007`) using the **Labels** gear in the sidebar

        ---

        ### RFC

        <!-- Which RFC does this feedback relate to? -->
        **RFC ID:** IFC5-XXX — *(title)*

        ---

        ### Comment type

        <!-- Mark one with an X -->
        - [ ] **Editorial** — grammar or clarity, no technical impact
        - [ ] **Technical Defect** — error of fact or logic
        - [ ] **Semantic Concern** — proposal may not mean what the author intends
        - [ ] **Compatibility Concern** — conflicts with IFC4.x or existing tooling
        - [ ] **Alternative Proposal** — a different approach not in the RFC
        - [ ] **Evidence** — data, examples, or prototypes relevant to the decision
        - [ ] **Blocking Objection** — RFC cannot advance as written
        - [ ] **General Support** — I support the recommendation

        ---

        ### Feedback

        <!-- Be specific — reference section numbers or quote RFC text where relevant -->


        ---

        ### Supporting evidence or examples

        <!-- Optional: links, code, schema examples, prior art -->


        ---

        ### Questions for the working group

        <!-- Optional: number each question Q1, Q2, ... -->

