name: RFC Priority Poll
description: Input on which RFCs to prioritize, defer, or drop
title: "[Priority] RFC prioritization input from "
labels: ["rfc-priority-poll"]
body:
  - type: markdown
    attributes:
      value: |
        Share your prioritization input on the RFC list. Review the [RFC Index](https://github.com/Drshelden/IFCV5Work/blob/master/02%20RFCs/README.md) first.
        You don't need to address every RFC — focus on the ones you have a strong view on.

        **Add your name to the title** before posting.

        ---

        ### Focus now — which RFCs should we tackle first?

        <!-- Mark each with [x] that you want prioritized -->

        **Tier 1 — Foundational**
        - [ ] IFC5-001 — Strategic Architecture Mode
        - [ ] IFC5-002 — Normative Information Model Formalism
        - [ ] IFC5-003 — Identity Model
        - [ ] IFC5-004 — Path Model and Addressing
        - [ ] IFC5-005 — Namespace and Qualified Names
        - [ ] IFC5-006 — Serialization and Encoding

        **Tier 2 — Core Architecture**
